version: "3.9"

services:
  mongo:
    image: mongo:6.0
    container_name: dns_tools_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--bind_ip_all"]

  redis:
    image: redis:7.2
    container_name: dns_tools_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
